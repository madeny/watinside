<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsInside - Open in App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .scan-id {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            color: #666;
            font-size: 14px;
        }
        
        .message {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            background: #000;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px 0;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .btn-secondary {
            background: #667eea;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📦</div>
        
        <div id="loading-state">
            <h1>Opening WhatsInside...</h1>
            <div class="message">
                <div class="loading"></div>
                <span>Redirecting to app...</span>
            </div>
        </div>
        
        <div id="fallback-state" class="hidden">
            <h1>Open in WhatsInside App</h1>
            <div class="scan-id" id="scan-info"></div>
            <div class="message">
                View this scan in the WhatsInside app for the best experience.
            </div>
            <a href="#" id="open-app-btn" class="btn btn-secondary">Open App</a>
            <a href="https://apps.apple.com/app/id6738595446" class="btn" target="_blank">Download from App Store</a>
        </div>
    </div>

    <script>
        // Extract scan ID from URL path
        const pathParts = window.location.pathname.split('/').filter(part => part);
        const scanId = pathParts.length > 1 ? pathParts[pathParts.length - 1] : null;
        
        // Show scan info if available
        if (scanId) {
            document.getElementById('scan-info').textContent = `Scan ID: ${scanId}`;
        }
        
        // Universal Links should handle this automatically, but we'll try to open the app
        const appUrl = `watinside://scan/${scanId || ''}`;
        
        // Try to open the app after a short delay
        setTimeout(() => {
            // If we're still on the page after 2 seconds, show the fallback
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('fallback-state').classList.remove('hidden');
        }, 2000);
        
        // Add click handler for "Open App" button
        document.getElementById('open-app-btn').addEventListener('click', function(e) {
            e.preventDefault();
            
            // Try custom URL scheme as fallback
            window.location.href = appUrl;
            
            // If still here after 1 second, they probably don't have the app
            setTimeout(() => {
                alert('App not installed. Please download from the App Store.');
            }, 1000);
        });
        
        // Detect if user came back to the page (app didn't open)
        let hidden = false;
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                hidden = true;
            }
        });
    </script>
</body>
</html>
